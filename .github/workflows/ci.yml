name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn scikit-learn pandas \
          pyarrow python-dotenv pydantic mlflow pytest \
          httpx numpy xgboost lightgbm catboost

      - name: Set environment variables
        run: echo "PROJECT_ROOT=$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Run tests
        run: pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install sklearn for dummy model
        run: pip install scikit-learn numpy

      - name: Create dummy model for Docker build
        run: |
          mkdir -p models
          python3 -c "
          import pickle
          from sklearn.linear_model import LinearRegression
          import numpy as np
          X = np.random.rand(100, 7)
          y = np.random.rand(100)
          model = LinearRegression().fit(X, y)
          with open('models/demand_forecast_v1.pkl', 'wb') as f:
              pickle.dump(model, f)
          print('Dummy model created')
          "

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t retail-demand-api:v1 .

      - name: Test Docker container health
        run: |
          docker run -d -p 8001:8000 \
            --name test-container \
            retail-demand-api:v1
          sleep 15
          curl -f http://localhost:8001/health
          docker stop test-container
